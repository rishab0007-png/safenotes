<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Notes Panel</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    
    <style>
        :root {
            --on: 0; 
            --bg-dark: #121417;
            --bg-light: #1c1f24;
            --primary: #d4af37;
            --panel-bg: rgba(255, 255, 255, 0.05);
            --panel-border: rgba(255, 255, 255, 0.1);
            --text-main: #f0f0f0;
            --text-muted: #888;
        }

        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background-color: var(--bg-dark); color: var(--text-main); height: 100vh; overflow-x: hidden; }
        button { cursor: pointer; border: none; outline: none; transition: 0.2s; }
        input, textarea { outline: none; font-family: inherit; }

        /* --- AUTH VIEW & LAMP --- */
        #auth-view { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; position: absolute; top: 0; left: 0; z-index: 10; background: var(--bg-dark); transition: opacity 0.5s; }
        .lamp-container { position: absolute; left: 20%; top: 25%; display: flex; flex-direction: column; align-items: center; z-index: 10; }
        .lamp-head { width: 120px; height: 60px; background: #e0e0e0; border-radius: 60px 60px 0 0; box-shadow: inset 0 -5px 15px rgba(0,0,0,0.2); position: relative; z-index: 5; }
        .lamp-stand { width: 8px; height: 100px; background: #666; z-index: 1; }
        .lamp-base { width: 60px; height: 12px; background: #e0e0e0; border-radius: 10px 10px 0 0; }
        #physics-canvas { position: absolute; top: 55px; left: 70px; width: 150px; height: 300px; z-index: 15; }
        .light-beam { position: absolute; top: 60px; width: 400px; height: 500px; background: linear-gradient(to bottom, rgba(255, 255, 220, 0.35), transparent); clip-path: polygon(35% 0, 65% 0, 100% 100%, 0 100%); opacity: var(--on); transition: opacity 0.3s ease; pointer-events: none; z-index: 2; }

        /* --- LOGIN BOX --- */
        .auth-box { position: relative; background: var(--panel-bg); backdrop-filter: blur(10px); padding: 40px; border-radius: 15px; width: 320px; border: 1px solid var(--panel-border); box-shadow: 0 15px 35px rgba(0,0,0,0.5); margin-left: 15%; opacity: 0; transform: translateY(20px); visibility: hidden; transition: all 0.5s; z-index: 5; }
        .auth-box.active { opacity: 1; transform: translateY(0); visibility: visible; }
        .auth-box h2 { text-align: center; margin-top: 0; color: var(--primary); }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 5px; font-size: 13px; color: var(--text-muted); }
        .input-group input { width: 100%; padding: 12px; background: rgba(0,0,0,0.3); border: 1px solid var(--panel-border); border-radius: 6px; color: white; box-sizing: border-box; }
        .input-group input:focus { border-color: var(--primary); }
        .auth-btn { width: 100%; padding: 12px; background: var(--primary); color: #000; font-weight: bold; border-radius: 6px; font-size: 16px; margin-top: 10px; display: flex; justify-content: center; align-items: center;}
        .auth-btn:hover { background: #ebd169; }
        .toggle-auth { text-align: center; margin-top: 15px; font-size: 13px; color: var(--text-muted); cursor: pointer; }
        .toggle-auth:hover { color: var(--text-main); text-decoration: underline; }
        #auth-msg { text-align: center; margin-top: 10px; font-size: 14px; color: #ff6b6b; min-height: 20px; }

        /* --- DASHBOARD VIEW --- */
        #dashboard-view { display: none; padding: 30px; max-width: 1200px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 20px; margin-bottom: 30px; }
        .header h1 { margin: 0; font-size: 24px; }
        .header-actions { display: flex; gap: 15px; }
        .btn-outline { background: transparent; border: 1px solid var(--primary); color: var(--primary); padding: 8px 16px; border-radius: 6px; }
        .btn-outline:hover { background: rgba(212, 175, 55, 0.1); }
        .btn-fill { background: var(--primary); color: #000; padding: 8px 16px; border-radius: 6px; font-weight: bold; }
        .btn-fill:hover { background: #ebd169; }

        .notes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .note-tile { background: #1a1d24; border-radius: 10px; padding: 20px; cursor: pointer; border-left: 5px solid var(--primary); transition: transform 0.2s, box-shadow 0.2s; display: flex; flex-direction: column; min-height: 150px; border: 1px solid #2a2e38; border-left-width: 5px; }
        .note-tile:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .note-title { font-size: 18px; font-weight: bold; margin: 0 0 10px 0; }
        .note-preview { color: #bbb; font-size: 14px; flex-grow: 1; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; line-height: 1.5;}
        .note-date { font-size: 11px; color: var(--text-muted); margin-top: 15px; text-align: right; }

        /* --- MODALS --- */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); justify-content: center; align-items: center; z-index: 100; }
        .modal-content { background: #1c1f26; width: 90%; max-width: 600px; border-radius: 12px; padding: 30px; border: 1px solid #333; display: flex; flex-direction: column; gap: 15px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        #modal-title { background: transparent; border: none; border-bottom: 1px solid #444; color: white; font-size: 22px; padding: 10px 0; font-weight: bold; }
        #modal-body { background: #121417; border: 1px solid #333; color: white; padding: 15px; border-radius: 8px; height: 250px; resize: none; font-size: 15px; line-height: 1.6; }
        .color-picker { display: flex; gap: 10px; margin-bottom: 10px; }
        .color-dot { width: 24px; height: 24px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; }
        .color-dot.active { border-color: white; transform: scale(1.1); }
        .modal-actions { display: flex; justify-content: space-between; margin-top: 10px; }
        .modal-right-btns { display: flex; gap: 10px; }
        .btn-danger { background: transparent; border: 1px solid #ff6b6b; color: #ff6b6b; padding: 8px 16px; border-radius: 6px; }
        .btn-danger:hover { background: rgba(255, 107, 107, 0.1); }
        
        .recovery-content { max-width: 400px; }
        .recovery-content h2 { color: var(--primary); margin-top: 0; text-align: center; }
        #rec-msg { text-align: center; color: #ff6b6b; font-size: 14px; min-height: 20px; margin-bottom: 10px; }
        
        /* Loading Spinner */
        .loader { border: 4px solid rgba(0,0,0,0.1); border-left-color: #000; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; margin: 0 auto; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="auth-view">
        <div class="lamp-container">
            <div class="lamp-head"></div>
            <div id="physics-canvas"></div> 
            <div class="lamp-stand"></div>
            <div class="lamp-base"></div>
            <div class="light-beam"></div>
        </div>

        <div class="auth-box" id="auth-box">
            <h2 id="auth-title">Sign In</h2>
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="you@example.com">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••">
            </div>
            <button class="auth-btn" id="auth-btn">
                <span id="btn-text">Sign In</span>
                <div class="loader" id="btn-loader"></div>
            </button>
            <div id="auth-msg"></div>
            
            <div class="toggle-auth" id="toggle-auth">Need an account? Sign Up here</div>
            <div class="toggle-auth" id="forgot-pass" style="color: var(--primary); margin-top: 5px;">Forgot Password?</div>
        </div>
    </div>

    <div class="modal-overlay" id="recovery-modal">
        <div class="modal-content recovery-content">
            <h2>Reset Password</h2>
            <p style="text-align: center; color: var(--text-muted); font-size: 14px;">Enter your email address to receive a secure password reset link.</p>
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="rec-email" placeholder="you@example.com">
            </div>
            <div id="rec-msg"></div>
            <div class="modal-actions" style="justify-content: space-between;">
                <button class="btn-outline" id="cancel-rec-btn" style="color: white; border-color: #555;">Cancel</button>
                <button class="btn-fill" id="send-rec-btn">Send Email</button>
            </div>
        </div>
    </div>

    <div id="dashboard-view">
        <div class="header">
            <h1>Notes Panel <span id="display-user" style="color: var(--primary); font-size:16px; margin-left:10px;"></span></h1>
            <div class="header-actions">
                <button class="btn-outline" id="logout-btn">Log Out</button>
                <button class="btn-fill" id="new-note-btn">+ Add Note</button>
            </div>
        </div>
        <div class="notes-grid" id="notes-grid"></div>
    </div>

    <div class="modal-overlay" id="note-modal">
        <div class="modal-content">
            <input type="text" id="modal-title" placeholder="Note Heading...">
            <div class="color-picker" id="color-picker">
                <div class="color-dot active" style="background: #d4af37;" data-color="#d4af37"></div>
                <div class="color-dot" style="background: #ff6b6b;" data-color="#ff6b6b"></div>
                <div class="color-dot" style="background: #4dabf7;" data-color="#4dabf7"></div>
                <div class="color-dot" style="background: #51cf66;" data-color="#51cf66"></div>
                <div class="color-dot" style="background: #cc5de8;" data-color="#cc5de8"></div>
            </div>
            <textarea id="modal-body" placeholder="Write your note here..."></textarea>
            <div class="modal-actions">
                <button class="btn-danger" id="delete-note-btn" style="display: none;">Delete</button>
                <div style="flex-grow: 1;"></div> 
                <div class="modal-right-btns">
                    <button class="btn-outline" id="close-modal-btn" style="color: white; border-color: #555;">Cancel</button>
                    <button class="btn-fill" id="save-note-btn">Save Note</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        // Import Firebase SDKs
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, query, where, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // --- YOUR FIREBASE CONFIGURATION ---
        const firebaseConfig = {
            apiKey: "AIzaSyCbBShuzkGruBWb8i0ESmnvP9bT14j9kU8",
            authDomain: "notes-app-a8a4b.firebaseapp.com",
            projectId: "notes-app-a8a4b",
            storageBucket: "notes-app-a8a4b.firebasestorage.app",
            messagingSenderId: "370030015432",
            appId: "1:370030015432:web:46a31e2895cf247bbf86fd",
            measurementId: "G-2YSRSW8B7S"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Global State
        let currentUser = null;
        let notes = [];
        let editingNoteId = null; 
        let selectedColor = "#d4af37";
        let isLoginMode = true;

        // --- MATTER.JS LAMP LOGIC ---
        let isOn = false;
        const root = document.documentElement;
        const authBox = document.getElementById('auth-box');

        function toggleLight() {
            isOn = !isOn; 
            root.style.setProperty("--on", isOn ? 1 : 0);
            if (isOn) {
                authBox.classList.add("active");
                gsap.to("body", { backgroundColor: "#1c1f24", duration: 0.6 });
            } else {
                authBox.classList.remove("active");
                gsap.to("body", { backgroundColor: "#121417", duration: 0.6 });
            }
        }

        const Engine = Matter.Engine, Render = Matter.Render, Runner = Matter.Runner, Composites = Matter.Composites, MouseConstraint = Matter.MouseConstraint, Mouse = Matter.Mouse, Composite = Matter.Composite, Constraint = Matter.Constraint, Bodies = Matter.Bodies, Events = Matter.Events;
        const engine = Engine.create(); const world = engine.world;
        const render = Render.create({ element: document.getElementById('physics-canvas'), engine: engine, options: { width: 150, height: 300, wireframes: false, background: 'transparent' } });
        Render.run(render); Runner.run(Runner.create(), engine);
        const group = Matter.Body.nextGroup(true);
        const rope = Composites.stack(30, 0, 1, 8, 0, 4, (x, y) => Bodies.circle(x, y, 3, { collisionFilter: { group: group }, render: { fillStyle: '#888888' }, density: 0.05 }));
        Composites.chain(rope, 0, 0.5, 0, -0.5, { stiffness: 1, length: 2, render: { visible: false } });
        Composite.add(rope, Constraint.create({ bodyA: rope.bodies[0], pointB: { x: 30, y: 0 }, pointA: { x: 0, y: 0 }, stiffness: 1, render: { visible: false } }));
        const handle = Bodies.rectangle(30, 120, 14, 28, { chamfer: { radius: 5 }, render: { fillStyle: '#d4af37' }, density: 0.2, frictionAir: 0.05 });
        Composite.add(world, Constraint.create({ bodyA: rope.bodies[7], bodyB: handle, pointA: { x: 0, y: 3 }, pointB: { x: 0, y: -10 }, stiffness: 1, render: { visible: false } }));
        Composite.add(world, [rope, handle]);
        const mouse = Mouse.create(render.canvas);
        const mouseConstraint = MouseConstraint.create(engine, { mouse: mouse, constraint: { stiffness: 0.2, render: { visible: false } } });
        mouseConstraint.mouse.element.removeEventListener("mousewheel", mouseConstraint.mouse.mousewheel);
        mouseConstraint.mouse.element.removeEventListener("DOMMouseScroll", mouseConstraint.mouse.mousewheel);
        Composite.add(world, mouseConstraint); render.mouse = mouse; 
        let restingY = handle.position.y; let isPulled = false;
        Events.on(engine, 'beforeUpdate', () => {
            if (handle.position.y > restingY + 25 && !isPulled) { isPulled = true; toggleLight(); } 
            else if (handle.position.y < restingY + 10 && isPulled) { isPulled = false; }
        });

        // --- AUTHENTICATION UI LOGIC ---
        const authTitle = document.getElementById('auth-title');
        const authBtn = document.getElementById('auth-btn');
        const btnText = document.getElementById('btn-text');
        const btnLoader = document.getElementById('btn-loader');
        const toggleAuthBtn = document.getElementById('toggle-auth');
        const authMsg = document.getElementById('auth-msg');
        const forgotPassBtn = document.getElementById('forgot-pass');

        function setLoading(isLoading) {
            btnText.style.display = isLoading ? "none" : "block";
            btnLoader.style.display = isLoading ? "block" : "none";
            authBtn.disabled = isLoading;
        }

        toggleAuthBtn.addEventListener('click', () => {
            isLoginMode = !isLoginMode;
            authTitle.innerText = isLoginMode ? "Sign In" : "Sign Up";
            btnText.innerText = isLoginMode ? "Sign In" : "Create Account";
            toggleAuthBtn.innerText = isLoginMode ? "Need an account? Sign Up here" : "Already have an account? Sign In";
            forgotPassBtn.style.display = isLoginMode ? "block" : "none";
            authMsg.innerText = "";
        });

        // --- FIREBASE LOGIN / SIGNUP ---
        authBtn.addEventListener('click', () => {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            authMsg.style.color = "#ff6b6b"; 

            if (!email || !password) return authMsg.innerText = "Please enter email and password.";
            setLoading(true);

            if (isLoginMode) {
                signInWithEmailAndPassword(auth, email, password)
                    .catch((error) => {
                        setLoading(false);
                        authMsg.innerText = "Invalid credentials. Try again.";
                        gsap.fromTo("#auth-box", { x: -10 }, { x: 10, duration: 0.1, yoyo: true, repeat: 3, onComplete: () => gsap.set("#auth-box", {x: 0}) });
                    });
            } else {
                createUserWithEmailAndPassword(auth, email, password)
                    .catch((error) => {
                        setLoading(false);
                        authMsg.innerText = error.message.replace("Firebase: ", "");
                    });
            }
        });

        // --- FIREBASE PASSWORD RESET ---
        document.getElementById('forgot-pass').addEventListener('click', () => {
            document.getElementById('recovery-modal').style.display = "flex";
            document.getElementById('rec-msg').innerText = "";
        });

        document.getElementById('cancel-rec-btn').addEventListener('click', () => {
            document.getElementById('recovery-modal').style.display = "none";
        });

        document.getElementById('send-rec-btn').addEventListener('click', () => {
            const email = document.getElementById('rec-email').value.trim();
            if(!email) return document.getElementById('rec-msg').innerText = "Enter your email.";
            
            sendPasswordResetEmail(auth, email)
                .then(() => {
                    document.getElementById('recovery-modal').style.display = "none";
                    authMsg.style.color = "#51cf66";
                    authMsg.innerText = "Password reset email sent! Check your inbox.";
                })
                .catch((error) => {
                    document.getElementById('rec-msg').innerText = "Email not found or invalid.";
                });
        });

        // --- FIREBASE AUTH STATE OBSERVER ---
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('display-user').innerText = user.email;
                document.getElementById('email').value = ""; document.getElementById('password').value = "";
                setLoading(false);
                document.getElementById('auth-view').style.opacity = "0";
                setTimeout(() => {
                    document.getElementById('auth-view').style.display = "none";
                    document.getElementById('dashboard-view').style.display = "block";
                    document.getElementById('auth-view').style.opacity = "1";
                    fetchNotesFromCloud();
                }, 500);
            } else {
                currentUser = null; notes = [];
                document.getElementById('notes-grid').innerHTML = "";
                document.getElementById('dashboard-view').style.display = "none";
                document.getElementById('auth-view').style.display = "flex";
                if(isOn) toggleLight();
            }
        });

        document.getElementById('logout-btn').addEventListener('click', () => signOut(auth));

        // --- CLOUD FIRESTORE (NOTES LOGIC) ---
        async function fetchNotesFromCloud() {
            if(!currentUser) return;
            const q = query(collection(db, "notes"), where("uid", "==", currentUser.uid));
            try {
                const querySnapshot = await getDocs(q);
                notes = [];
                querySnapshot.forEach((doc) => {
                    notes.push({ id: doc.id, ...doc.data() });
                });
                renderNotes();
            } catch (error) {
                console.error("Error fetching notes:", error);
                document.getElementById('notes-grid').innerHTML = "<p style='color:#ff6b6b; grid-column: 1/-1;'>Could not load notes. Make sure Firestore is enabled in Firebase!</p>";
            }
        }

        function renderNotes() {
            const grid = document.getElementById('notes-grid');
            grid.innerHTML = ""; 
            if (notes.length === 0) return grid.innerHTML = "<p style='color:#888; grid-column: 1/-1;'>No notes yet. Click '+ Add Note' to create one!</p>";

            for (let i = notes.length - 1; i >= 0; i--) {
                const note = notes[i];
                const tile = document.createElement('div');
                tile.className = 'note-tile'; tile.style.borderLeftColor = note.color;
                let preview = note.body.replace(/\n/g, "<br>");
                tile.innerHTML = `<h3 class="note-title">${note.title || "Untitled"}</h3><div class="note-preview">${preview}</div><div class="note-date">${note.date}</div>`;
                tile.addEventListener('click', () => openModal(note.id));
                grid.appendChild(tile);
            }
        }

        // --- NOTE MODAL LOGIC ---
        const noteModal = document.getElementById('note-modal');
        const colorDots = document.querySelectorAll('.color-dot');
        colorDots.forEach(dot => { dot.addEventListener('click', (e) => { colorDots.forEach(d => d.classList.remove('active')); e.target.classList.add('active'); selectedColor = e.target.getAttribute('data-color'); }); });
        
        function setModalColor(hex) { selectedColor = hex; colorDots.forEach(dot => { dot.classList.toggle('active', dot.getAttribute('data-color') === hex); }); }

        function openModal(noteId = null) {
            editingNoteId = noteId; noteModal.style.display = "flex";
            if (noteId) {
                const n = notes.find(x => x.id === noteId);
                document.getElementById('modal-title').value = n.title; document.getElementById('modal-body').value = n.body; setModalColor(n.color); document.getElementById('delete-note-btn').style.display = "block"; 
            } else {
                document.getElementById('modal-title').value = ""; document.getElementById('modal-body').value = ""; setModalColor("#d4af37"); document.getElementById('delete-note-btn').style.display = "none"; 
            }
        }

        document.getElementById('new-note-btn').addEventListener('click', () => openModal(null));
        document.getElementById('close-modal-btn').addEventListener('click', () => noteModal.style.display = "none");

        document.getElementById('save-note-btn').addEventListener('click', async () => {
            const titleVal = document.getElementById('modal-title').value.trim(); 
            const bodyVal = document.getElementById('modal-body').value.trim();
            if (!titleVal && !bodyVal) return noteModal.style.display = "none";

            const now = new Date(); const dateStr = now.toLocaleDateString() + " " + now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            document.getElementById('save-note-btn').innerText = "Saving...";

            if (editingNoteId) {
                const noteRef = doc(db, "notes", editingNoteId);
                await updateDoc(noteRef, { title: titleVal, body: bodyVal, color: selectedColor, date: "Edited: " + dateStr });
            } else {
                await addDoc(collection(db, "notes"), { uid: currentUser.uid, title: titleVal, body: bodyVal, color: selectedColor, date: dateStr });
            }

            document.getElementById('save-note-btn').innerText = "Save Note";
            noteModal.style.display = "none";
            fetchNotesFromCloud();
        });

        document.getElementById('delete-note-btn').addEventListener('click', async () => {
            if (confirm("Are you sure you want to delete this note?")) {
                await deleteDoc(doc(db, "notes", editingNoteId));
                noteModal.style.display = "none";
                fetchNotesFromCloud();
            }
        });
    </script>
</body>
</html>
