<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cloud Notes Panel</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    
    <style>
        * { box-sizing: border-box; }
        :root {
            --on: 0; 
            --bg-dark: #121417;
            --primary: #d4af37;
            --panel-bg: rgba(255, 255, 255, 0.05);
            --panel-border: rgba(255, 255, 255, 0.1);
            --text-main: #f0f0f0;
            --text-muted: #888;
        }

        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background-color: var(--bg-dark); color: var(--text-main); min-height: 100vh; overflow-x: hidden; }
        button { cursor: pointer; border: none; outline: none; transition: 0.2s; font-family: inherit; }
        input, textarea { outline: none; font-family: inherit; }

        /* --- AMBIENT LIGHTING & LAMP UI --- */
        .ambient-light { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: radial-gradient(circle at 35% 25%, rgba(255, 235, 170, 0.5) 0%, rgba(255, 220, 140, 0.25) 40%, rgba(255, 200, 100, 0.05) 80%, transparent 100%); opacity: var(--on); transition: opacity 0.6s ease-in-out; pointer-events: none; z-index: 1; }
        #auth-view { width: 100vw; height: 100vh; position: fixed; top: 0; left: 0; z-index: 10; background: transparent; overflow: hidden; }
        .lamp-container { position: absolute; left: 25%; top: 15%; display: flex; flex-direction: column; align-items: center; z-index: 10; }
        .lamp-shade { width: 180px; height: 110px; background: linear-gradient(to bottom, #fdfbf1, #e3d5a8); clip-path: polygon(25% 0, 75% 0, 100% 100%, 0 100%); border-radius: 4px; box-shadow: inset 0 -10px 20px rgba(0,0,0,0.1); z-index: 5; position: relative; }
        .lamp-stand-top { width: 22px; height: 14px; background: linear-gradient(to right, #8b6914, #f4d068, #8b6914); border-radius: 4px; margin-top: 2px; }
        .lamp-stand-middle { width: 45px; height: 60px; background: linear-gradient(to right, #6b4e07, #d4af37, #6b4e07); border-radius: 50% 50% 40% 40%; }
        .lamp-stand-bottom { width: 35px; height: 35px; background: linear-gradient(to right, #8b6914, #f4d068, #8b6914); clip-path: polygon(15% 0, 85% 0, 100% 100%, 0 100%); }
        .lamp-base-pedestal { width: 65px; height: 8px; background: #b08d25; border-radius: 3px 3px 0 0; }
        .lamp-base { width: 140px; height: 15px; background: linear-gradient(to right, #5c4505, #cfa830, #5c4505); border-radius: 10px 10px 2px 2px; }
        #physics-canvas { position: absolute; top: 105px; right: 15px; width: 80px; height: 120px; z-index: 15; touch-action: none; }

        /* --- AUTH BOX --- */
        .auth-box { position: absolute; top: 50%; left: 65%; transform: translate(-50%, -40%); background: var(--panel-bg); backdrop-filter: blur(15px); padding: 40px; border-radius: 15px; width: 340px; border: 1px solid var(--panel-border); box-shadow: 0 15px 35px rgba(0,0,0,0.6); opacity: 0; visibility: hidden; transition: all 0.5s; z-index: 5; }
        .auth-box.active { opacity: 1; transform: translate(-50%, -50%); visibility: visible; box-shadow: 0 20px 50px rgba(212, 175, 55, 0.15); border: 1px solid rgba(212, 175, 55, 0.3); }
        .auth-box-inner { width: 100%; }
        .auth-box h2 { text-align: center; margin-top: 0; color: var(--primary); }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 5px; font-size: 13px; color: var(--text-muted); }
        .input-group input { width: 100%; padding: 12px; background: rgba(0,0,0,0.5); border: 1px solid var(--panel-border); border-radius: 6px; color: white; transition: 0.3s; }
        .input-group input:focus { border-color: var(--primary); background: rgba(0,0,0,0.7); }
        .auth-btn { width: 100%; padding: 12px; background: var(--primary); color: #000; font-weight: bold; border-radius: 6px; font-size: 16px; margin-top: 10px; display: flex; justify-content: center; align-items: center;}
        .auth-btn:hover { background: #ebd169; transform: translateY(-2px); }
        .toggle-auth { text-align: center; margin-top: 15px; font-size: 13px; color: var(--text-muted); cursor: pointer; }
        .toggle-auth:hover { color: var(--text-main); text-decoration: underline; }

        /* --- DASHBOARD VIEW --- */
        #dashboard-view { display: none; padding: 30px; max-width: 1200px; margin: 0 auto; position: relative; z-index: 5; opacity: 0; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 20px; margin-bottom: 30px; }
        .header h1 { margin: 0; font-size: 24px; }
        .header-actions { display: flex; gap: 15px; }
        .btn-outline { background: transparent; border: 1px solid var(--primary); color: var(--primary); padding: 8px 16px; border-radius: 6px; }
        .btn-outline:hover { background: rgba(212, 175, 55, 0.1); }
        .btn-fill { background: var(--primary); color: #000; padding: 8px 16px; border-radius: 6px; font-weight: bold; }
        .btn-fill:hover { background: #ebd169; }

        .notes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .note-tile { background: #1a1d24; border-radius: 10px; padding: 20px; cursor: pointer; border-left: 5px solid var(--primary); transition: transform 0.2s, box-shadow 0.2s; display: flex; flex-direction: column; min-height: 150px; border: 1px solid #2a2e38; border-left-width: 5px; }
        .note-tile:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .note-title { font-size: 18px; font-weight: bold; margin: 0 0 10px 0; }
        .note-preview { color: #bbb; font-size: 14px; flex-grow: 1; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; line-height: 1.5; white-space: pre-wrap;}
        .note-date { font-size: 11px; color: var(--text-muted); margin-top: 15px; text-align: right; }

        /* --- 100% ORIGINAL IMAGE SUPPORT UI --- */
        .note-cover-image { width: 100%; height: auto; max-height: 400px; object-fit: contain; border-radius: 6px; margin-bottom: 15px; border: 1px solid #333; background: rgba(0,0,0,0.2); }
        #trigger-upload-btn:hover { color: var(--primary); border-color: var(--primary) !important; }

        /* --- MODALS --- */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); justify-content: center; align-items: center; z-index: 100; padding: 15px; }
        .modal-content { background: #1c1f26; width: 100%; max-width: 600px; border-radius: 12px; padding: 30px; border: 1px solid #333; display: flex; flex-direction: column; gap: 15px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); max-height: 90vh; overflow-y: auto; }
        #modal-title { background: transparent; border: none; border-bottom: 1px solid #444; color: white; font-size: 22px; padding: 10px 0; font-weight: bold; width: 100%; }
        #modal-body { background: #121417; border: 1px solid #333; color: white; padding: 15px; border-radius: 8px; height: 200px; resize: none; font-size: 15px; line-height: 1.6; width: 100%; }
        .char-count { font-size: 11px; color: var(--text-muted); text-align: right; margin-top: -10px; }
        .color-picker { display: flex; gap: 10px; margin-bottom: 10px; }
        .color-dot { width: 24px; height: 24px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; }
        .color-dot.active { border-color: white; transform: scale(1.1); }
        .modal-actions { display: flex; justify-content: space-between; margin-top: 10px; width: 100%; }
        .modal-right-btns { display: flex; gap: 10px; }
        .btn-danger { background: transparent; border: 1px solid #ff6b6b; color: #ff6b6b; padding: 8px 16px; border-radius: 6px; }
        .btn-danger:hover { background: rgba(255, 107, 107, 0.1); }
        .recovery-content { max-width: 400px; }
        .recovery-content h2 { color: var(--primary); margin-top: 0; text-align: center; }
        
        /* --- TOAST NOTIFICATIONS --- */
        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 1000; display: flex; flex-direction: column; gap: 10px; }
        .toast { background: #1c1f26; border-left: 4px solid var(--primary); color: white; padding: 15px 20px; border-radius: 6px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); font-size: 14px; opacity: 0; }
        .toast.error { border-left-color: #ff6b6b; }
        .toast.success { border-left-color: #51cf66; }

        /* --- EMPTY STATE --- */
        .empty-state { grid-column: 1 / -1; text-align: center; padding: 60px 20px; color: var(--text-muted); display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.2); border-radius: 10px; border: 1px dashed #333; }
        .empty-state svg { width: 80px; height: 80px; opacity: 0.5; margin-bottom: 20px; }
        .empty-state h3 { color: white; margin: 0 0 10px 0; }

        .loader { border: 4px solid rgba(0,0,0,0.1); border-left-color: #d4af37; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; margin: 0 auto; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* --- MOBILE RESPONSIVE --- */
        @media (max-width: 768px) {
            .lamp-container { left: 50%; transform: translateX(-50%); top: 8vh; }
            .ambient-light { background: radial-gradient(circle at 50% 15%, rgba(255, 235, 170, 0.5) 0%, rgba(255, 220, 140, 0.25) 50%, rgba(255, 200, 100, 0.05) 90%, transparent 100%); }
            .auth-box { top: 45vh; left: 50%; transform: translate(-50%, 20px); width: 90%; max-width: 380px; padding: 25px 20px; }
            .auth-box.active { transform: translate(-50%, 0); }
            #dashboard-view { padding: 15px; }
            .header { flex-direction: column; align-items: flex-start; gap: 15px; }
            .header h1 { font-size: 20px; word-break: break-all; }
            .header-actions { width: 100%; justify-content: space-between; }
            .notes-grid { grid-template-columns: 1fr; gap: 15px; }
            .modal-content { padding: 20px; }
            .modal-actions { flex-direction: column-reverse; gap: 15px; }
            .modal-right-btns { width: 100%; justify-content: space-between; }
            .btn-danger { width: 100%; }
            #toast-container { top: 10px; right: 10px; left: 10px; align-items: center; }
            .toast { width: 100%; max-width: 400px; }
        }
    </style>
</head>
<body>
    
    <div id="toast-container"></div>
    <div class="ambient-light"></div>

    <div id="auth-view">
        <div class="lamp-container">
            <div class="lamp-shade"></div>
            <div id="physics-canvas"></div> 
            <div class="lamp-stand-top"></div>
            <div class="lamp-stand-middle"></div>
            <div class="lamp-stand-bottom"></div>
            <div class="lamp-base-pedestal"></div>
            <div class="lamp-base"></div>
        </div>

        <div class="auth-box" id="auth-box">
            <div class="auth-box-inner" id="auth-box-inner">
                <h2 id="auth-title">Sign In</h2>
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
                </div>
                <button class="auth-btn" id="auth-btn">
                    <span id="btn-text">Sign In</span>
                    <div class="loader" id="btn-loader"></div>
                </button>
                <div class="toggle-auth" id="toggle-auth">Need an account? Sign Up here</div>
                <div class="toggle-auth" id="forgot-pass" style="color: var(--primary); margin-top: 5px;">Forgot Password?</div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="recovery-modal">
        <div class="modal-content recovery-content">
            <h2>Reset Password</h2>
            <p style="text-align: center; color: var(--text-muted); font-size: 14px;">Enter your email address to receive a secure password reset link.</p>
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="rec-email" placeholder="you@example.com" autocomplete="email">
            </div>
            <div class="modal-actions" style="flex-direction: row; justify-content: space-between;">
                <button class="btn-outline" id="cancel-rec-btn" style="color: white; border-color: #555;">Cancel</button>
                <button class="btn-fill" id="send-rec-btn">Send Email</button>
            </div>
        </div>
    </div>

    <div id="dashboard-view">
        <div class="header">
            <h1>Notes Panel <span id="display-user" style="color: var(--primary); font-size:16px; margin-left:10px; display:block; margin-top:5px;"></span></h1>
            
            <div class="header-actions">
                <button class="btn-outline" id="logout-btn" style="color: white; border-color: #555;">Log Out</button>
                <button class="btn-outline" id="new-photo-btn" style="color: white; border-color: #555;">+ Add Photo</button>
                <button class="btn-fill" id="new-note-btn">+ Add Note</button>
            </div>
        </div>
        <div class="notes-grid" id="notes-grid"></div>
    </div>

    <div class="modal-overlay" id="note-modal">
        <div class="modal-content">
            <input type="text" id="modal-title" placeholder="Note Heading..." maxlength="200">
            
            <div class="color-picker" id="color-picker">
                <div class="color-dot active" style="background: #d4af37;" data-color="#d4af37"></div>
                <div class="color-dot" style="background: #ff6b6b;" data-color="#ff6b6b"></div>
                <div class="color-dot" style="background: #4dabf7;" data-color="#4dabf7"></div>
                <div class="color-dot" style="background: #51cf66;" data-color="#51cf66"></div>
                <div class="color-dot" style="background: #cc5de8;" data-color="#cc5de8"></div>
            </div>
            
            <textarea id="modal-body" placeholder="Write your note here..." maxlength="20000"></textarea>
            <div class="char-count"><span id="char-count-display">0</span> / 20,000</div>
            
            <div class="image-upload-wrapper" style="margin-top: 15px; margin-bottom: 10px;">
                <input type="file" id="note-image" accept="image/*" style="display: none;">
                <button class="btn-outline" id="trigger-upload-btn" style="width: 100%; border-style: dashed; color: var(--text-muted); border-color: #555;">
                    + Add Photo
                </button>
                <div id="image-preview-container" style="display: none; position: relative;">
                    <img id="image-preview" src="" style="width: 100%; height: auto; max-height: 400px; object-fit: contain; border-radius: 8px; border: 1px solid #333; background: rgba(0,0,0,0.3);">
                    
                    <div style="position: absolute; top: 10px; right: 10px; display: flex; gap: 8px;">
                        <button id="download-image-btn" style="background: rgba(0,0,0,0.7); color: white; padding: 0 10px; border-radius: 4px; display: flex; justify-content: center; align-items: center; border: 1px solid #51cf66; cursor: pointer; font-size: 12px; height: 30px; font-weight: bold;">Download Original</button>
                        <button id="remove-image-btn" style="background: rgba(0,0,0,0.7); color: white; border-radius: 50%; width: 30px; height: 30px; display: flex; justify-content: center; align-items: center; border: 1px solid #ff6b6b; cursor: pointer; font-weight: bold;">X</button>
                    </div>
                </div>
            </div>

            <div class="modal-actions">
                <button class="btn-danger" id="delete-note-btn" style="display: none;">Delete</button>
                <div style="flex-grow: 1;" class="spacer"></div> 
                <div class="modal-right-btns">
                    <button class="btn-outline" id="close-modal-btn" style="color: white; border-color: #555;">Cancel</button>
                    <button class="btn-fill" id="save-note-btn">Save Note</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, query, where, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCbBShuzkGruBWb8i0ESmnvP9bT14j9kU8",
            authDomain: "notes-app-a8a4b.firebaseapp.com",
            projectId: "notes-app-a8a4b",
            storageBucket: "notes-app-a8a4b.firebasestorage.app",
            messagingSenderId: "370030015432",
            appId: "1:370030015432:web:46a31e2895cf247bbf86fd",
            measurementId: "G-2YSRSW8B7S"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app); 

        // --- GLOBAL STATE ---
        let currentUser = null;
        let notes = [];
        let editingNoteId = null; 
        let selectedColor = "#d4af37";
        let isLoginMode = true;

        // ==========================================
        // 1. SECURITY & UTILITY FUNCTIONS
        // ==========================================
        
        function escapeHTML(str) {
            if (!str) return "";
            return str.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag]));
        }

        function showToast(message, type = "error") {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerText = message;
            container.appendChild(toast);

            const isMobile = window.innerWidth <= 768;
            gsap.set(toast, { x: isMobile ? 0 : '120%', y: isMobile ? '-80px' : 0, opacity: 0 });
            gsap.to(toast, { opacity: 1, x: 0, y: 0, duration: 0.4, ease: "power2.out" });

            setTimeout(() => {
                gsap.to(toast, { 
                    opacity: 0, x: isMobile ? 0 : '120%', y: isMobile ? '-80px' : 0, duration: 0.4, 
                    onComplete: () => toast.remove() 
                });
            }, 3500);
        }

        // ==========================================
        // 2. MATTER.JS LAMP PHYSICS
        // ==========================================
        let isOn = false;
        const root = document.documentElement;
        const authBox = document.getElementById('auth-box');

        function toggleLight() {
            isOn = !isOn; 
            root.style.setProperty("--on", isOn ? 1 : 0);
            if (isOn) {
                authBox.classList.add("active");
                gsap.to("body", { backgroundColor: "#26231c", duration: 0.6 });
            } else {
                authBox.classList.remove("active");
                gsap.to("body", { backgroundColor: "#121417", duration: 0.6 });
            }
        }

        const Engine = Matter.Engine, Render = Matter.Render, Runner = Matter.Runner,
              MouseConstraint = Matter.MouseConstraint, Mouse = Matter.Mouse,
              Composite = Matter.Composite, Constraint = Matter.Constraint,
              Bodies = Matter.Bodies, Events = Matter.Events;

        const engine = Engine.create();
        const world = engine.world;
        const canvasElement = document.getElementById('physics-canvas');
        
        const render = Render.create({
            element: canvasElement, engine: engine,
            options: { width: 80, height: 120, wireframes: false, background: 'transparent' }
        });
        Render.run(render);
        Runner.run(Runner.create(), engine);
        
        const handle = Bodies.rectangle(40, 60, 10, 24, { chamfer: { radius: 3 }, render: { fillStyle: '#d4af37' }, density: 0.1, frictionAir: 0.08 });
        const spring = Constraint.create({ pointA: { x: 40, y: 0 }, bodyB: handle, pointB: { x: 0, y: -12 }, stiffness: 0.05, damping: 0.05, render: { visible: true, strokeStyle: '#d4af37', lineWidth: 2 } });
        Composite.add(world, [handle, spring]);
        
        const mouse = Mouse.create(render.canvas);
        const mouseConstraint = MouseConstraint.create(engine, { mouse: mouse, constraint: { stiffness: 0.2, render: { visible: false } } });
        mouseConstraint.mouse.element.removeEventListener("mousewheel", mouseConstraint.mouse.mousewheel);
        mouseConstraint.mouse.element.removeEventListener("DOMMouseScroll", mouseConstraint.mouse.mousewheel);
        Composite.add(world, mouseConstraint);
        render.mouse = mouse;

        function releaseString() { if (mouseConstraint.body) { mouseConstraint.body = null; mouseConstraint.constraint.bodyB = null; } }
        window.addEventListener('mouseup', releaseString);
        window.addEventListener('touchend', releaseString);
        canvasElement.addEventListener('mouseleave', releaseString);
        render.canvas.addEventListener('touchstart', e => e.preventDefault(), { passive: false });
        render.canvas.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
        
        let restingY = 60;
        let isPulled = false;
        Events.on(engine, 'beforeUpdate', () => {
            Matter.Body.setPosition(handle, { x: 40, y: handle.position.y });
            Matter.Body.setVelocity(handle, { x: 0, y: handle.velocity.y });
            if (handle.position.y > restingY + 25 && !isPulled) { isPulled = true; toggleLight(); } 
            else if (handle.position.y < restingY + 10 && isPulled) { isPulled = false; }
        });

        // ==========================================
        // 3. AUTHENTICATION & VIEW ROUTING
        // ==========================================
        const authTitle = document.getElementById('auth-title');
        const authBtn = document.getElementById('auth-btn');
        const btnText = document.getElementById('btn-text');
        const btnLoader = document.getElementById('btn-loader');
        const toggleAuthBtn = document.getElementById('toggle-auth');
        const forgotPassBtn = document.getElementById('forgot-pass');

        function setLoading(isLoading) {
            btnText.style.display = isLoading ? "none" : "block";
            btnLoader.style.display = isLoading ? "block" : "none";
            authBtn.disabled = isLoading;
        }

        toggleAuthBtn.addEventListener('click', () => {
            isLoginMode = !isLoginMode;
            authTitle.innerText = isLoginMode ? "Sign In" : "Sign Up";
            btnText.innerText = isLoginMode ? "Sign In" : "Create Account";
            toggleAuthBtn.innerText = isLoginMode ? "Need an account? Sign Up here" : "Already have an account? Sign In";
            forgotPassBtn.style.display = isLoginMode ? "block" : "none";
        });

        authBtn.addEventListener('click', () => {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            
            if (!email || !password) return showToast("Please enter email and password.", "error");
            setLoading(true);

            if (isLoginMode) {
                signInWithEmailAndPassword(auth, email, password).catch(() => {
                    setLoading(false);
                    showToast("Invalid credentials. Please try again.", "error");
                    gsap.fromTo("#auth-box-inner", { x: -10 }, { x: 10, duration: 0.08, yoyo: true, repeat: 5, onComplete: () => gsap.set("#auth-box-inner", { x: 0 }) });
                });
            } else {
                createUserWithEmailAndPassword(auth, email, password).catch((error) => {
                    setLoading(false);
                    showToast(error.message.replace("Firebase: ", ""), "error");
                });
            }
        });

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('display-user').innerText = `(${user.email})`;
                document.getElementById('email').value = ""; document.getElementById('password').value = "";
                setLoading(false);
                
                gsap.to('#auth-view', { opacity: 0, duration: 0.5, onComplete: () => {
                    document.getElementById('auth-view').style.display = "none";
                    document.getElementById('dashboard-view').style.display = "block";
                    gsap.fromTo('#dashboard-view', { opacity: 0, y: 30 }, { opacity: 1, y: 0, duration: 0.6, ease: "power2.out" });
                    fetchNotesFromCloud();
                }});
            } else {
                currentUser = null;
                gsap.to('#dashboard-view', { opacity: 0, duration: 0.3, onComplete: () => {
                    document.getElementById('dashboard-view').style.display = "none";
                    document.getElementById('auth-view').style.display = "block";
                    gsap.to('#auth-view', { opacity: 1, duration: 0.5 });
                }});
            }
        });

        // ==========================================
        // 4. NOTES CRUD, IMAGE UPLOAD & UI LOGIC
        // ==========================================
        const notesGrid = document.getElementById('notes-grid');
        const noteModal = document.getElementById('note-modal');
        const modalTitle = document.getElementById('modal-title');
        const modalBody = document.getElementById('modal-body');
        const deleteNoteBtn = document.getElementById('delete-note-btn');
        const colorDots = document.querySelectorAll('.color-dot');
        const charCountDisplay = document.getElementById('char-count-display');

        // Image Variables
        const imageInput = document.getElementById('note-image');
        const triggerUploadBtn = document.getElementById('trigger-upload-btn');
        const imagePreviewContainer = document.getElementById('image-preview-container');
        const imagePreview = document.getElementById('image-preview');
        const removeImageBtn = document.getElementById('remove-image-btn');
        const downloadImageBtn = document.getElementById('download-image-btn'); 
        
        let currentFile = null;
        let existingImageUrl = null;

        triggerUploadBtn.addEventListener('click', (e) => { e.preventDefault(); imageInput.click(); });

        imageInput.addEventListener('change', (e) => {
            if (e.target.files && e.target.files[0]) {
                currentFile = e.target.files[0];
                imagePreview.src = URL.createObjectURL(currentFile);
                triggerUploadBtn.style.display = "none";
                imagePreviewContainer.style.display = "block";
                downloadImageBtn.style.display = "flex"; 
            }
        });

        removeImageBtn.addEventListener('click', (e) => {
            e.preventDefault();
            currentFile = null; existingImageUrl = null; imageInput.value = ""; imagePreview.src = "";
            imagePreviewContainer.style.display = "none"; triggerUploadBtn.style.display = "block";
        });

        downloadImageBtn.addEventListener('click', async (e) => {
            e.preventDefault();
            const urlToDownload = existingImageUrl || (currentFile ? URL.createObjectURL(currentFile) : null);
            if (!urlToDownload) return;
            showToast("Starting download...", "success");
            try {
                const response = await fetch(urlToDownload); const blob = await response.blob();
                const downloadUrl = window.URL.createObjectURL(blob);
                const a = document.createElement('a'); a.style.display = 'none'; a.href = downloadUrl;
                a.download = "CloudNote_Image_" + Date.now() + ".png";
                document.body.appendChild(a); a.click(); window.URL.revokeObjectURL(downloadUrl); a.remove();
            } catch(err) { window.open(urlToDownload, '_blank'); }
        });

        modalBody.addEventListener('input', () => { charCountDisplay.textContent = modalBody.value.length.toLocaleString(); });
        document.getElementById('logout-btn').addEventListener('click', () => signOut(auth));

        function resetModalState() {
            editingNoteId = null; modalTitle.value = ""; modalBody.value = ""; charCountDisplay.textContent = "0";
            colorDots.forEach(d => d.classList.remove('active')); colorDots[0].classList.add('active');
            selectedColor = colorDots[0].getAttribute('data-color');
            currentFile = null; existingImageUrl = null; imageInput.value = ""; imagePreviewContainer.style.display = "none";
            triggerUploadBtn.style.display = "block"; deleteNoteBtn.style.display = "none"; noteModal.style.display = "flex";
        }

        document.getElementById('new-photo-btn').addEventListener('click', () => { resetModalState(); imageInput.click(); });
        document.getElementById('new-note-btn').addEventListener('click', () => { resetModalState(); });
        document.getElementById('close-modal-btn').addEventListener('click', () => { noteModal.style.display = "none"; });

        colorDots.forEach(dot => {
            dot.addEventListener('click', (e) => {
                colorDots.forEach(d => d.classList.remove('active')); e.target.classList.add('active');
                selectedColor = e.target.getAttribute('data-color');
            });
        });

        async function fetchNotesFromCloud() {
            if (!currentUser) return;
            notesGrid.innerHTML = '<div class="loader" style="display:block; margin-top:50px;"></div>';
            try {
                const q = query(collection(db, "notes"), where("userId", "==", currentUser.uid));
                const querySnapshot = await getDocs(q); notes = [];
                querySnapshot.forEach((d) => { notes.push({ id: d.id, ...d.data() }); });
                notes.sort((a, b) => b.createdAt - a.createdAt); renderNotes();
            } catch (e) { console.error(e); showToast("Failed to load notes.", "error"); }
        }

        function renderNotes() {
            notesGrid.innerHTML = "";
            if (notes.length === 0) {
                notesGrid.innerHTML = `<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 20h9M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z" stroke-linecap="round" stroke-linejoin="round"/></svg><h3>It's pretty quiet here</h3><p>Click "+ Add Note" or "+ Add Photo" in the top right to get started.</p></div>`;
                return;
            }
            notes.forEach(note => {
                const tile = document.createElement('div'); tile.className = "note-tile";
                tile.style.borderColor = "#2a2e38"; tile.style.borderLeftColor = note.color;
                const imageHTML = note.imageUrl ? `<img src="${escapeHTML(note.imageUrl)}" class="note-cover-image" alt="Saved Photo">` : '';
                tile.innerHTML = `${imageHTML}<h3 class="note-title">${escapeHTML(note.title) || "Untitled"}</h3><div class="note-preview">${escapeHTML(note.content)}</div><div class="note-date">${new Date(note.createdAt).toLocaleDateString()}</div>`;
                tile.addEventListener('click', () => openEditModal(note)); notesGrid.appendChild(tile);
            });
        }

        function openEditModal(note) {
            editingNoteId = note.id; modalTitle.value = note.title; modalBody.value = note.content;
            charCountDisplay.textContent = note.content ? note.content.length.toLocaleString() : "0"; selectedColor = note.color || "#d4af37";
            let matched = false;
            colorDots.forEach(d => { const isMatch = d.getAttribute('data-color') === selectedColor; d.classList.toggle('active', isMatch); if (isMatch) matched = true; });
            if (!matched) { colorDots[0].classList.add('active'); selectedColor = colorDots[0].getAttribute('data-color'); }
            currentFile = null;
            if (note.imageUrl) {
                existingImageUrl = note.imageUrl; imagePreview.src = note.imageUrl;
                triggerUploadBtn.style.display = "none"; imagePreviewContainer.style.display = "block"; downloadImageBtn.style.display = "flex";
            } else {
                existingImageUrl = null; imagePreviewContainer.style.display = "none"; triggerUploadBtn.style.display = "block"; downloadImageBtn.style.display = "none";
            }
            deleteNoteBtn.style.display = "block"; noteModal.style.display = "flex";
        }

        document.getElementById('save-note-btn').addEventListener('click', async () => {
            if (!currentUser) return;
            const title = modalTitle.value.trim(); const content = modalBody.value.trim();

            if (!content && !title && !currentFile && !existingImageUrl) { showToast("Cannot save an empty note.", "error"); return; }
            if (title.length > 200) { showToast("Title is too long.", "error"); return; }
            if (content.length > 20000) { showToast("Note body is too long.", "error"); return; }

            noteModal.style.display = "none";
            notesGrid.innerHTML = '<div class="loader" style="display:block; margin-top:50px;"></div>';

            try {
                let finalImageUrl = existingImageUrl;
                if (currentFile) {
                    showToast("Uploading original image... This may take a few seconds.", "success");
                    const fileRef = ref(storage, `notes_images/${currentUser.uid}/${Date.now()}_${currentFile.name}`);
                    await uploadBytes(fileRef, currentFile);
                    finalImageUrl = await getDownloadURL(fileRef);
                }

                const noteData = {
                    userId: currentUser.uid, title: title, content: content, color: selectedColor, imageUrl: finalImageUrl, 
                    createdAt: editingNoteId ? notes.find(n => n.id === editingNoteId).createdAt : Date.now()
                };

                if (editingNoteId) { await updateDoc(doc(db, "notes", editingNoteId), noteData); } 
                else { await addDoc(collection(db, "notes"), noteData); }
                showToast("Saved successfully!", "success");
                
                fetchNotesFromCloud();
            } catch (e) {
                console.error("FIREBASE ERROR:", e);
                showToast("Upload blocked! Check Firebase Storage rules.", "error");
                fetchNotesFromCloud(); 
            }
        });

        deleteNoteBtn.addEventListener('click', async () => {
            if (!editingNoteId) return;
            noteModal.style.display = "none"; notesGrid.innerHTML = '<div class="loader" style="display:block; margin-top:50px;"></div>';
            try { await deleteDoc(doc(db, "notes", editingNoteId)); showToast("Deleted", "success"); fetchNotesFromCloud(); } 
            catch (e) { showToast("Error deleting.", "error"); fetchNotesFromCloud(); }
        });

        document.getElementById('forgot-pass').addEventListener('click', () => { document.getElementById('rec-email').value = ''; document.getElementById('recovery-modal').style.display = "flex"; });
        document.getElementById('cancel-rec-btn').addEventListener('click', () => { document.getElementById('recovery-modal').style.display = "none"; });
        document.getElementById('send-rec-btn').addEventListener('click', () => {
            const email = document.getElementById('rec-email').value.trim();
            if (!email) return showToast("Enter your email address.", "error");
            sendPasswordResetEmail(auth, email).then(() => { document.getElementById('recovery-modal').style.display = "none"; showToast("Password reset email sent!", "success"); }).catch(() => showToast("Email not found.", "error"));
        });
        document.addEventListener('keydown', (e) => {
            if (e.key !== 'Escape') return;
            if (noteModal.style.display === 'flex') noteModal.style.display = 'none';
            if (document.getElementById('recovery-modal').style.display === 'flex') document.getElementById('recovery-modal').style.display = 'none';
        });
    </script>
</body>
</html>
